name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: janitor
          POSTGRES_PASSWORD: janitor
          POSTGRES_DB: data_janitor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          cd backend
          pip install -r requirements.txt
          pytest -xvs --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://janitor:janitor@localhost:5432/data_janitor_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          SECRET_KEY: test-secret
          ENCRYPTION_KEY: test-encryption-key-32-bytes-long!!

  build:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: docker build -t data-janitor-backend ./backend
      - name: Build frontend Docker image
        run: docker build -t data-janitor-frontend ./frontend
